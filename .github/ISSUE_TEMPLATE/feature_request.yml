name: Feature Request
description: Suggest a new feature for DexRay
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a new feature or improvement for DexRay.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of the problem. Ex. "I'm always frustrated when..."
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: dropdown
    id: owasp
    attributes:
      label: OWASP Category
      description: Does this relate to an OWASP Mobile category?
      options:
        - "M1: Improper Platform Usage"
        - "M2: Insecure Data Storage"
        - "M3: Insecure Communication"
        - "M4: Insecure Authentication"
        - "M5: Insufficient Cryptography"
        - "M6: Insecure Authorization"
        - "M7: Client Code Quality"
        - "M8: Code Tampering"
        - "M9: Reverse Engineering"
        - "M10: Extraneous Functionality"
        - "N/A"
    validations:
      required: false
